<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Calc 80s</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --calc-bg: #16213e;
            --neon-pink: #ff007f;
            --neon-cyan: #00f2ff;
            --text-color: #e94560;
            --display-bg: #0f3460;
        }

        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--neon-cyan);
        }

        .calculator {
            background: var(--calc-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), 0 0 10px var(--neon-pink);
            width: 90%;
            max-width: 350px;
            border: 2px solid var(--neon-pink);
        }

        #display {
            width: 100%;
            height: 60px;
            background: var(--display-bg);
            border: 2px inset var(--neon-pink);
            margin-bottom: 20px;
            text-align: right;
            padding: 10px;
            font-size: 2rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 5px var(--neon-cyan);
            overflow: hidden;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 60px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 4px 4px 0px var(--neon-pink);
        }

        button:active {
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }

        button.operator {
            color: var(--neon-cyan);
            background: #1a1a2e;
        }

        button.equal {
            grid-column: span 2;
            background: var(--neon-pink);
            color: white;
            box-shadow: 4px 4px 0px var(--neon-cyan);
        }

        button.clear {
            grid-column: span 2;
            background: #533483;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div id="display">0</div>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">CLEAR</button>
        <button class="operator" onclick="appendToDisplay('/')">/</button>
        <button class="operator" onclick="appendToDisplay('*')">×</button>
        
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="appendToDisplay('-')">-</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="appendToDisplay('+')">+</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="calculate()">=</button>
        
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button>
        <button class="equal" onclick="calculate()">ENTER</button>
    </div>
</div>

<script>
    let display = document.getElementById('display');
    let currentInput = '';

    function appendToDisplay(value) {
        if (display.innerText === '0' || display.innerText === 'Error') {
            display.innerText = value;
        } else {
            display.innerText += value;
        }
    }

    function clearDisplay() {
        display.innerText = '0';
    }

    function calculate() {
        try {
            // Eval é usado aqui para simplificar, mas em sistemas complexos 
            // recomenda-se um parser próprio por segurança.
            display.innerText = eval(display.innerText.replace('×', '*'));
        } catch (e) {
            display.innerText = 'Error';
        }
    }
</script>

</body>
</html>
